services:
  - type: web
    runtime: node
    name: stremio-dual-subs
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "7001"
      # No API key needed server-side — users provide their own
      # OpenSubtitles API key via the Stremio add-on config UI.
